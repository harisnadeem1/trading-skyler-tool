<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Market Test</title>
  <link rel="stylesheet" href="./css/live-test.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div>
        <h1>Live Market Test</h1>
        <p>Testing live backend trade monitoring for open trades.</p>
      </div>
      <div class="status-wrap">
        <span id="connectionStatus" class="status status--waiting">Connecting...</span>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Connection Info</h2>
      </div>
      <div class="info-grid">
        <div class="metric">
          <span>Backend Base URL</span>
          <strong id="backendUrlText">http://localhost:3000</strong>
        </div>
        <div class="metric">
          <span>Stream URL</span>
          <strong id="streamUrlText">http://localhost:3000/api/market/stream</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Open Trade Feed</h2>
        <button id="clearLogBtn" class="btn" type="button">Clear Log</button>
      </div>

      <div id="tradeGrid" class="trade-grid">
        <div class="empty-state">No live trade updates yet.</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Event Log</h2>
      </div>
      <div id="eventLog" class="event-log"></div>
    </section>
  </main>

  <script type="module" src="./js/liveTestPage.js"></script>
</body>
</html>
